<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
  <title>Backpack</title>
</head>
<body>
  <div id="app">
    <!-- Auth Section (shown when not signed in) -->
    <div id="authSection" class="auth-section hidden">
      <div class="auth-logo">
        <img src="../icons/logo.svg" alt="" width="56" height="56" />
      </div>
      <h1 class="auth-title">Backpack</h1>
      <p class="auth-subtitle">Save UI components from any website with one click.</p>

      <div class="auth-steps">
        <div class="step">
          <div class="step-num">1</div>
          <span>Sign in to Backpack</span>
        </div>
        <div class="step">
          <div class="step-num">2</div>
          <span>Select a pack</span>
        </div>
        <div class="step">
          <div class="step-num">3</div>
          <span>Pick any component</span>
        </div>
      </div>

      <button class="btn-connect" id="btnConnect">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Sign in with Backpack
      </button>
    </div>

    <!-- Signed in section -->
    <div id="mainSection" class="hidden">
      <!-- Header -->
      <div class="header">
        <div class="header-left">
          <img src="../icons/logo.svg" alt="" width="20" height="20" class="header-logo" />
          <span class="header-title">Backpack</span>
        </div>
        <div class="header-right">
          <div class="user-avatar" id="userAvatar">?</div>
        </div>
      </div>

      <!-- Pack Selector -->
      <div class="section">
        <div class="section-header">
          <span class="section-label">Packs</span>
          <button class="btn-new" id="btnNewPack">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            New
          </button>
        </div>

        <div id="newPackForm" class="new-pack-form hidden">
          <input type="text" id="newPackName" placeholder="Pack name..." class="input" />
          <div class="form-actions">
            <button class="btn-cancel" id="btnCancelPack">Cancel</button>
            <button class="btn-create" id="btnCreatePack">Create</button>
          </div>
        </div>

        <div id="packList" class="pack-list"></div>
      </div>

      <!-- Pick Button -->
      <div class="pick-section">
        <button class="btn-pick" id="btnPick" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 9l7-7 7 7"/>
            <path d="M12 2v14"/>
            <path d="M5 19h14"/>
          </svg>
          Pick Component
        </button>
      </div>

      <!-- Footer -->
      <div class="footer">
        <span class="user-name" id="userName">User</span>
        <button class="btn-disconnect" id="btnDisconnect">Sign out</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
